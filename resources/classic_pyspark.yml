# the environment setup job for databricks_de_professional_practice.

resources:
  jobs:
    classic_pyspark_silver_gold:
      name: classic_pyspark_silver_gold
      
      parameters:
        - name: env
          default: ${var.env}
        - name: initial_run
          default: "False"
      
      schedule:
        quartz_cron_expression: "0 0 */12 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
      # silver layer
        - task_key: silver_vehicles
          notebook_task:
            notebook_path: ../src/classic_approach/silver/batch/silver_scd1_vehicles.ipynb
        
        - task_key: silver_shipment_events
          notebook_task:
            notebook_path: ../src/classic_approach/silver/batch/silver_shipment_events.ipynb
        
        - task_key: silver_vehicle_telemetry
          notebook_task:
            notebook_path: ../src/classic_approach/silver/batch/silver_vehicle_telemetry.ipynb
        
        - task_key: silver_customers
          notebook_task:
            notebook_path: ../src/classic_approach/silver/stream/silver_scd2_customers.ipynb
        
        - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/classic_approach/silver/stream/silver_scd2_orders.ipynb

        - task_key: silver_static_location_lookup_table
          notebook_task:
            notebook_path: ../src/classic_approach/silver/static/silver_static_location_lookup.ipynb
          

      # gold layer
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_customers
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_dim_customer.ipynb
        
        - task_key: gold_dim_vehicle
          depends_on:
            - task_key: silver_vehicles
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_dim_vehicle.ipynb         
        
        - task_key: gold_dim_location
          depends_on:
            - task_key: silver_static_location_lookup_table
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_dim_location.ipynb
        
        - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_dim_date.ipynb

        - task_key: gold_fact_order_fulfillment
          depends_on:
            - task_key: silver_orders
            - task_key: gold_dim_customer
            - task_key: gold_dim_location
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_fact_order_fulfillment.ipynb
        
        - task_key: gold_fact_shipment_event
          depends_on:
            - task_key: silver_shipment_events
            - task_key: gold_dim_vehicle
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_fact_shipment_event.ipynb

        - task_key: gold_fact_vehicle_telemetry
          depends_on:
            - task_key: silver_vehicle_telemetry
            - task_key: gold_dim_vehicle
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_fact_vehicle_telemetry.ipynb

        - task_key: gold_delete_customer_downstream
          depends_on:
            - task_key: gold_fact_order_fulfillment
            - task_key: gold_dim_customer
          notebook_task:
            notebook_path: ../src/classic_approach/gold/gold_delete_customer_downstream.ipynb

