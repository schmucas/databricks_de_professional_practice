# This is a Databricks asset bundle definition for databricks_de_professional_practice.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_de_professional_practice
  uuid: 43e3422c-45b9-43de-9b39-b015f3bd3664

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  env:
    description: The environment to use
  workspace_user:
    description: Databricks workspace username
    default: ${workspace.current_user.userName}

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    permissions:
    - user_name: ${var.workspace_user}
      level: CAN_MANAGE
    default: true
    variables:
      env: dev
  stage:
    mode: production
    presets:
      name_prefix: 'stage_'
    permissions:
    - user_name: ${var.workspace_user}
      level: CAN_MANAGE
    workspace:
      root_path: /Workspace/Shared/${bundle.target}/${bundle.name}
    variables:
      env: stage
  prod:
    mode: production
    presets:
      name_prefix: 'prod_'
    permissions:
    - user_name: ${var.workspace_user}
      level: CAN_MANAGE
    workspace:
      root_path: /Workspace/Shared/${bundle.target}/${bundle.name}
    variables:
      env: prod
