name: PR Checks

on:
  pull_request:
    branches:
      - main  # TODO: verify this matches your trunk branch name

jobs:
  validate-and-test:
    name: Lint / Validate / Test
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      # Clone the repo onto the runner
      - uses: actions/checkout@v4

      # Install uv (fast Python package manager)
      - uses: astral-sh/setup-uv@v5

      # Install Python 3.11 — explicit so runner OS default can't change under us
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install project dev dependencies (pytest, ruff, databricks-connect, etc.)
      - name: Install dependencies
        run: uv sync --group dev

      # Check code style/formatting — fails fast before touching Databricks
      - name: Lint (ruff)
        run: uv run ruff check .

      # Install the Databricks CLI onto the runner
      - uses: databricks/setup-cli@main

      # Parse and validate databricks.yml + all resource files without deploying anything
      - name: Bundle validate (dev target)
        run: databricks bundle validate --target dev

      # Tests use Databricks Connect and require a live serverless session.
      # Each PR run consumes serverless DBUs. Remove this step if that is
      # not acceptable and rely on post-merge integration tests instead.
      # TODO: unit tests — revisit once conftest.py is restructured to
      # initialize Databricks Connect lazily (only when spark fixture is used).
      # - name: Run tests
      #   run: uv run pytest tests/ -m "not integration" -v
