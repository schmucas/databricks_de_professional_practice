name: PR Checks

on:
  pull_request:
    branches:
      - main  # TODO: verify this matches your trunk branch name

jobs:
  validate-and-test:
    name: Lint / Validate / Test
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      # Clone the repo onto the runner
      - uses: actions/checkout@v4

      # Install uv (fast Python package manager)
      - uses: astral-sh/setup-uv@v5

      # Install Python 3.12 — explicit so runner OS default can't change under us
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install project dev dependencies (pytest, ruff, databricks-connect, etc.)
      - name: Install dependencies
        run: uv sync --group dev

      # Check code style/formatting — fails fast before touching Databricks
      - name: Lint (ruff)
        id: lint
        run: uv run ruff check .

      # Install the Databricks CLI onto the runner
      - uses: databricks/setup-cli@main

      # Parse and validate databricks.yml + all resource files without deploying anything
      - name: Bundle validate (dev target)
        id: validate
        run: databricks bundle validate --target dev

      # Note: tests use Databricks Connect and require a live serverless session.
      # Each PR run consumes serverless DBUs.
      # --junitxml writes machine-readable results for the summary step below.
      - name: Run tests
        id: pytest
        run: uv run pytest tests/ -v --junitxml=pytest-results.xml

      # Render a visual report on the run's Summary tab (GITHUB_STEP_SUMMARY):
      # a checks-overview table, a pass/fail pie chart, and a per-test table.
      # Runs even when an earlier step failed, so red runs still get a report.
      - name: Publish job summary
        if: always()
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        run: |
          python3 - <<'EOF'
          import os
          import xml.etree.ElementTree as ET

          ICONS = {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}

          def icon(outcome: str) -> str:
              return f"{ICONS.get(outcome, '❔')} {outcome}"

          lines = ["# 🧪 PR check results", ""]

          # ---- Checks overview -------------------------------------------------
          lines += [
              "| Check | Outcome |",
              "|---|---|",
              f"| Lint (ruff) | {icon(os.environ['LINT_OUTCOME'])} |",
              f"| Bundle validate (dev) | {icon(os.environ['VALIDATE_OUTCOME'])} |",
              f"| Unit tests (pytest) | {icon(os.environ['PYTEST_OUTCOME'])} |",
              "",
          ]

          # ---- Per-test details from the JUnit XML -----------------------------
          if os.path.exists("pytest-results.xml"):
              suite = ET.parse("pytest-results.xml").getroot()
              if suite.tag == "testsuites":
                  suite = suite.find("testsuite")

              total = int(suite.get("tests", 0))
              failures = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
              skipped = int(suite.get("skipped", 0))
              passed = total - failures - skipped
              duration = float(suite.get("time", 0))

              lines += [
                  "## Unit tests",
                  "",
                  f"**{passed} passed** · **{failures} failed** · "
                  f"**{skipped} skipped** · {total} total · {duration:.1f}s",
                  "",
              ]

              if total:
                  lines += [
                      "```mermaid",
                      "pie showData",
                      '    title Test results',
                      f'    "Passed" : {passed}',
                      *([f'    "Failed" : {failures}'] if failures else []),
                      *([f'    "Skipped" : {skipped}'] if skipped else []),
                      "```",
                      "",
                  ]

              lines += ["| Test | Result | Time |", "|---|---|---|"]
              for case in suite.iter("testcase"):
                  name = f"`{case.get('classname', '')}::{case.get('name', '')}`"
                  time = f"{float(case.get('time', 0)):.2f}s"
                  fail = case.find("failure") if case.find("failure") is not None else case.find("error")
                  if fail is not None:
                      lines.append(f"| {name} | ❌ failed | {time} |")
                  elif case.find("skipped") is not None:
                      lines.append(f"| {name} | ⏭️ skipped | {time} |")
                  else:
                      lines.append(f"| {name} | ✅ passed | {time} |")
              lines.append("")
          elif os.environ["PYTEST_OUTCOME"] == "skipped":
              lines += ["_Unit tests did not run (an earlier check failed)._", ""]
          else:
              lines += ["_No pytest-results.xml found._", ""]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write("\n".join(lines) + "\n")
          EOF
